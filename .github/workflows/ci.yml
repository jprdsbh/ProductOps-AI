name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela runs antigos da mesma PR/branch ao chegar um novo push
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck · build · security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # API NestJS: gera Prisma client + checa tipos (sem emitir, é mais rápido)
      - name: API — Prisma generate
        run: npx prisma generate
        working-directory: apps/api

      - name: API — typecheck
        run: npx tsc --noEmit
        working-directory: apps/api

      # Web Next.js: build de produção (já roda typecheck + lint internos)
      - name: Web — build
        run: npx next build
        working-directory: apps/web
        env:
          # Builds estáticos rodam sem API real; usa placeholders pra não falhar
          API_URL: http://localhost:3002
          TBOT_URL: http://localhost:8000

      # Segurança: deps vulneráveis + segredos hardcoded + padrões de risco
      # Não bloqueia o merge (continue-on-error) porque hoje há high/critical
      # transitivas conhecidas (ver SECURITY.md). Vira blocker quando o plano
      # de upgrade do Next/NestJS for executado.
      - name: Security scan
        run: npm run security:scan
        continue-on-error: true
